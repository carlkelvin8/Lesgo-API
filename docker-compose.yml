version: '3.8'

services:
  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lesgo-api
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - lesgo-network
    ports:
      - "8000:80"
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_CONNECTION=${DB_CONNECTION:-pgsql}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-lesgo_db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    depends_on:
      - db
      - redis

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: lesgo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-lesgo_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lesgo-network
    ports:
      - "5432:5432"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lesgo-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis-data:/data
    networks:
      - lesgo-network
    ports:
      - "6379:6379"

  # Adminer (Database Management)
  adminer:
    image: adminer:latest
    container_name: lesgo-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - lesgo-network
    environment:
      ADMINER_DEFAULT_SERVER: db

networks:
  lesgo-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
