services:
  - type: web
    name: lesgo-api
    env: php
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: LeSGo
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: base64:JdLZOIyWhtB3TAPOaNmg+OmXlQtpa7X3uqAug/EhHC4=
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: lesgo-api
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: lesgo-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: lesgo-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: lesgo-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: lesgo-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: lesgo-db
          property: password

databases:
  - name: lesgo-db
    databaseName: lesgo_production
    user: lesgo_user